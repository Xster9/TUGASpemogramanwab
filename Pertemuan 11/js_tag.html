<!DOCTYPE html>
<html>
<head>
    <title>JS - Cara Menyisipkan Script</title>
</head>
<body>
    <h1>Cara Menyisipkan JavaScript</h1>
    
    <!-- Cara 1: Di dalam tag <script> -->
    <script>
        console.log("Cara 1: Internal JavaScript");
        alert("Halo dari internal JS!");
    </script>

    <!-- Cara 2: Event pada elemen HTML (inline) -->
    <button onclick="alert('Inline JS: Tombol diklik!')">Klik Saya (Inline)</button>

    <!-- Cara 3: External JS (contoh, tidak ada file external disini) -->
    <!-- <script src="script.js"></script> -->

    <p>Lihat console browser (F12) untuk melihat output log.</p>
</body>
</html>
